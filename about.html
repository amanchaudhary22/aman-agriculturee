<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - Aman Agriculture</title>
  <style>
    body{margin:0;padding:0;font-family:Arial,sans-serif;background:url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1920&fit=crop') no-repeat center center fixed;background-size:cover;color:white;text-align:center;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
    body::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(27,94,32,0.85);z-index:1}
    .container{max-width:600px;padding:40px 20px;animation:fadeIn 1s;position:relative;z-index:2;background:rgba(0,0,0,0.2);border-radius:20px;border:2px solid white}
    h1{font-size:48px;margin-bottom:20px;animation:slideDown 1s}
    p{font-size:18px;line-height:1.6;margin:15px 0;animation:fadeInUp 1.2s}
    .btn{background:white;color:#1b5e20;padding:12px 30px;border-radius:25px;text-decoration:none;display:inline-block;margin-top:30px;font-weight:bold;font-size:16px;transition:0.3s;animation:zoomIn 1.5s}
    .btn:hover{background:#e8f5e9;transform:scale(1.05)}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideDown{from{transform:translateY(-30px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeInUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes zoomIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
  </style>
</head>
<body>
  <div class="container">
    <h1>About Us 👨‍🌾</h1>
    <p>Aman Agriculture is dedicated to spreading knowledge about Indian farming and crops.</p>
    <p>We help farmers and students learn about major crops like Wheat, Rice, Sugarcane, Potato, and Mustard grown in India.</p>
    <p><strong>Location:</strong> Bulandshahr, Uttar Pradesh, India</p>
    <a href="index.html" class="btn">← Back to Home</a>
  </div>
</body>
</html>
